# Langfuse 本地化部署配置
# 端口占用: 3000 (Web UI), 5432 (PostgreSQL), 8123/9000 (ClickHouse), 6379 (Redis)
version: "3.8"

services:
  # ==========================================================================
  # Langfuse Web 应用服务器
  # ==========================================================================
  langfuse-web:
    image: docker.io/langfuse/langfuse:latest
    container_name: langfuse-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 数据库连接
      - DATABASE_URL=postgresql://postgres:changeme@postgres:5432/langfuse

      # ClickHouse 连接 (V3 格式)
      - CLICKHOUSE_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=langfuse123

      # Redis 缓存
      - REDIS_CONNECTION_STRING=redis://redis:6379

      # 认证密钥 (生产环境请修改)
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme-secret-min-32-chars-long}
      - SALT=${LANGFUSE_SALT:-changeme-salt-min-32-chars-long}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY:-changeme-encryption-key-32-bytes}

      # 其他配置
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
      - NEXT_PUBLIC_LANGFUSE_CLOUD_REGION=local

      # 对象存储 (使用 MinIO)
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=langfuse
      - S3_REGION=us-east-1

    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - langfuse-network

  # ==========================================================================
  # Langfuse Worker 后台任务处理器
  # ==========================================================================
  langfuse-worker:
    image: docker.io/langfuse/langfuse:latest
    container_name: langfuse-worker
    restart: unless-stopped
    command: ["worker"]
    environment:
      # 数据库连接
      - DATABASE_URL=postgresql://postgres:changeme@postgres:5432/langfuse

      # ClickHouse 连接 (V3 格式)
      - CLICKHOUSE_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=langfuse123

      # Redis 缓存
      - REDIS_CONNECTION_STRING=redis://redis:6379

      # 对象存储
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=langfuse
      - S3_REGION=us-east-1

    depends_on:
      langfuse-web:
        condition: service_healthy
    networks:
      - langfuse-network

  # ==========================================================================
  # PostgreSQL - 元数据存储
  # ==========================================================================
  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=langfuse
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=changeme
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse-network

  # ==========================================================================
  # ClickHouse - OLAP 数据存储 (Trace/Span 数据)
  # ==========================================================================
  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:23.8
    container_name: langfuse-clickhouse
    restart: unless-stopped
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_ALWAYS_START_INITDB=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - langfuse-network

  # ==========================================================================
  # Redis - 缓存层
  # ==========================================================================
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - langfuse-network

  # ==========================================================================
  # MinIO - 对象存储 (S3 兼容)
  # ==========================================================================
  minio:
    image: docker.io/minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langfuse-network

networks:
  langfuse-network:
    driver: bridge

volumes:
  langfuse_postgres_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_redis_data:
    driver: local
  langfuse_minio_data:
    driver: local
